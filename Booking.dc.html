<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wild Deer Barbershop Booking</title>
<link rel="icon" type="image/png" href="uploads/ChatGPT Image Jun 24, 2026, 02_52_35 AM (2).png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0;padding:0;box-sizing:border-box }
  html { scroll-behavior:smooth }
  body { background:#141211;color:#f0ebe3;min-height:100vh }
  input,button,select,textarea { outline:none;font-family:inherit }
  input::placeholder { color:rgba(240,235,227,0.2) }
  ::-webkit-scrollbar { width:4px;height:4px }
  ::-webkit-scrollbar-track { background:transparent }
  ::-webkit-scrollbar-thumb { background:rgba(240,235,227,0.1) }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
</style>
</head>
<body>
<div id="bookingApp" style="min-height:100vh;background:#141211;font-family:'DM Sans',sans-serif"></div>

<script>
const logoPath = "uploads/ChatGPT Image Jun 24, 2026, 02_52_35 AM (2).png";
const app = document.getElementById("bookingApp");

const SERVICES = [
  { id:"haircut", name:"Haircut", duration:"30 min", price:12, category:"hair", desc:"An elevated grooming experience — starting with a one-on-one consultation, followed by a refreshing cleanse, conditioning care, and a flawless style to finish." },
  { id:"haircut-beard", name:"Haircut & Beard trim", duration:"45 min", price:17, category:"hair", desc:"Everything you need to look sharp and feel fresh — custom haircut, beard sculpting, express facial, hair wash, and expert styling. The full reset, done right." },
  { id:"beard", name:"Beard trim", duration:"25 min", price:7, category:"hair", desc:"Sharp lines. Clean finish. Expertly sculpted by WILD DEER for a refined, masculine look." },
  { id:"wild-face", name:"Wild face", duration:"45 min", price:30, category:"face", desc:"A ritual for tired skin: deep cleanse, hydration, and instant glow. Perfect after a shave or before a night out." },
  { id:"dandruff", name:"Treatment for Dandruff", duration:"30 min", price:25, category:"scalp", desc:"Clear flakes. Calm irritation. An intensive treatment to remove visible dandruff, rebalance the scalp, and prevent its return." },
  { id:"sensitive", name:"Treatment for Sensitive Scalp", duration:"30 min", price:25, category:"scalp", desc:"Gentle care for irritated, reactive skin. This calming treatment soothes redness, dryness, and sensitivity." }
];

const BARBERS = [
  { id:"any", name:"No preference", role:"Maximum availability", initials:"⇌" },
  { id:"mahmoud", name:"Mahmoud", role:"Barber", initials:"M" },
  { id:"yazan", name:"Yazan", role:"Barber", initials:"Y" }
];

const TIME_SLOTS = [
  "11:00","11:30","12:00","12:30","13:00","13:30",
  "14:00","14:30","15:00","15:30","16:00","16:30",
  "17:00","17:30","18:00","18:30","19:00","19:30","20:00"
];
const UNAVAILABLE = ["12:00","14:30","16:00","18:00","19:30"];

const state = {
  step: 0,
  selectedServices: [],
  selectedBarber: null,
  selectedDate: null,
  selectedTime: null,
  activeCategory: "all",
  weekOffset: 0,
  name: "",
  phone: "",
  email: "",
  booked: false
};

function esc(value) {
  return String(value).replace(/[&<>"']/g, char => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[char]));
}

function parseDuration(str) {
  return parseInt(str, 10) || 0;
}

function cartItems() {
  return SERVICES.filter(service => state.selectedServices.includes(service.id));
}

function totalPrice() {
  return cartItems().reduce((sum, item) => sum + item.price, 0);
}

function totalDuration() {
  return cartItems().reduce((sum, item) => sum + parseDuration(item.duration), 0);
}

function formatTime(time) {
  const parts = time.split(":").map(Number);
  const suffix = parts[0] >= 12 ? "PM" : "AM";
  const hour = parts[0] % 12 || 12;
  return hour + ":" + String(parts[1]).padStart(2, "0") + " " + suffix;
}

function formatDate(dateString) {
  if (!dateString) return "";
  return new Date(dateString + "T12:00:00").toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" });
}

function selectedBarberName() {
  const barber = BARBERS.find(item => item.id === state.selectedBarber);
  return barber ? barber.name : "";
}

function canContinue(step) {
  if (step === 0) return state.selectedServices.length > 0;
  if (step === 1) return state.selectedBarber !== null;
  if (step === 2) return state.selectedDate !== null && state.selectedTime !== null;
  return state.name.trim().length > 1 && state.phone.trim().length > 5 && state.email.trim().includes("@") && state.email.trim().includes(".");
}

function toggleService(id) {
  state.selectedServices = state.selectedServices.includes(id)
    ? state.selectedServices.filter(item => item !== id)
    : [...state.selectedServices, id];
  render();
}

function renderTopBar() {
  const labels = ["Services", "Barber", "Time", "Confirm"];
  const indicators = labels.map((label, index) => {
    const complete = state.step > index || state.booked;
    const current = state.step === index && !state.booked;
    const dotBg = complete ? "#b8956a" : current ? "#f0ebe3" : "rgba(240,235,227,0.1)";
    const dotColor = complete || current ? "#141211" : "rgba(240,235,227,0.25)";
    const labelColor = current ? "#f0ebe3" : complete ? "#b8956a" : "rgba(240,235,227,0.18)";
    const lineColor = complete ? "rgba(184,149,106,0.5)" : "rgba(240,235,227,0.08)";
    return `
      <div style="display:flex;align-items:center;gap:4px">
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 10px">
          <div style="width:22px;height:22px;border-radius:50%;background:${dotBg};display:flex;align-items:center;justify-content:center;transition:background 0.4s">
            <span style="font-size:9px;font-weight:700;color:${dotColor}">${complete ? "✓" : index + 1}</span>
          </div>
          <span style="font-size:9px;font-weight:500;letter-spacing:1.5px;color:${labelColor};text-transform:uppercase;transition:color 0.4s">${label}</span>
        </div>
        ${index < labels.length - 1 ? `<div style="width:28px;height:1px;background:${lineColor};transition:background 0.4s;margin-bottom:12px"></div>` : ""}
      </div>
    `;
  }).join("");

  return `
    <div style="position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(20,18,17,0.96);backdrop-filter:blur(8px);border-bottom:1px solid rgba(240,235,227,0.06);padding:0 48px;height:68px;display:flex;align-items:center;justify-content:space-between">
      <a href="Barbershop.dc.html" style="display:flex;align-items:center;gap:10px;text-decoration:none">
        <img src="${logoPath}" style="height:30px;width:auto" alt="">
        <span style="font-size:10px;font-weight:600;letter-spacing:4px;color:rgba(240,235,227,0.4);text-transform:uppercase">Wild Deer</span>
      </a>
      <div style="display:flex;align-items:center;gap:4px">${indicators}</div>
      <a href="Barbershop.dc.html" style="font-size:10px;font-weight:500;letter-spacing:2px;color:rgba(240,235,227,0.25);text-decoration:none;text-transform:uppercase;transition:color 0.3s" onmouseover="this.style.color='rgba(240,235,227,0.6)'" onmouseout="this.style.color='rgba(240,235,227,0.25)'">← Site</a>
    </div>
  `;
}

function renderCategories() {
  const categories = [
    { id:"all", label:"All" },
    { id:"hair", label:"Hair" },
    { id:"face", label:"Face" },
    { id:"scalp", label:"Scalp" }
  ];

  return categories.map(category => {
    const active = state.activeCategory === category.id;
    return `<button data-action="category" data-id="${category.id}" style="padding:7px 18px;border:1px solid ${active ? "#f0ebe3" : "rgba(240,235,227,0.14)"};background:${active ? "#f0ebe3" : "transparent"};color:${active ? "#141211" : "rgba(240,235,227,0.45)"};font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s">${category.label}</button>`;
  }).join("");
}

function renderServiceGroups() {
  const categories = state.activeCategory === "all" ? ["hair", "face", "scalp"] : [state.activeCategory];
  const labels = { hair:"Hair", face:"Face", scalp:"Scalp Treatment" };

  return categories.map(category => {
    const items = SERVICES.filter(service => service.category === category);
    if (items.length === 0) return "";
    const cards = items.map(service => {
      const selected = state.selectedServices.includes(service.id);
      return `
        <div data-action="toggle-service" data-id="${service.id}" style="background:${selected ? "#242220" : "#1c1a18"};border-left:2px solid ${selected ? "rgba(184,149,106,0.65)" : "transparent"};padding:22px 24px;margin-bottom:2px;cursor:pointer;transition:all 0.22s;display:flex;justify-content:space-between;align-items:flex-start;gap:20px">
          <div style="flex:1">
            <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:5px">
              <h3 style="font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;color:#f0ebe3">${esc(service.name)}</h3>
              <span style="font-size:11px;color:rgba(240,235,227,0.3);letter-spacing:0.5px">${service.duration} · Male only</span>
            </div>
            <p style="font-size:12px;color:rgba(240,235,227,0.38);line-height:1.65;margin-bottom:14px">${esc(service.desc)}</p>
            <span style="font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;color:rgba(240,235,227,0.8)">JOD ${service.price}</span>
          </div>
          <div style="width:30px;height:30px;border-radius:50%;border:1px solid ${selected ? "#b8956a" : "rgba(240,235,227,0.18)"};background:${selected ? "#b8956a" : "transparent"};color:${selected ? "#141211" : "rgba(240,235,227,0.45)"};display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:300;flex-shrink:0;transition:all 0.22s;margin-top:2px">${selected ? "−" : "+"}</div>
        </div>
      `;
    }).join("");

    return `
      <div style="margin-bottom:40px">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
          <span style="font-size:10px;font-weight:600;letter-spacing:3px;color:rgba(184,149,106,0.5);text-transform:uppercase">${labels[category]}</span>
          <div style="flex:1;height:1px;background:rgba(240,235,227,0.05)"></div>
        </div>
        ${cards}
      </div>
    `;
  }).join("");
}

function renderCart() {
  const items = cartItems();
  const itemHtml = items.length === 0
    ? `<p style="font-size:12px;color:rgba(240,235,227,0.25);font-style:italic;padding-bottom:20px">No services selected</p>`
    : `<div style="display:flex;flex-direction:column;gap:10px;padding-bottom:20px">
        ${items.map(item => `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div style="flex:1">
              <div style="font-size:12px;color:rgba(240,235,227,0.8);margin-bottom:2px">${esc(item.name)}</div>
              <div style="font-size:10px;color:rgba(240,235,227,0.28)">${item.duration}</div>
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:12px;color:rgba(240,235,227,0.5)">JOD ${item.price}</span>
              <button data-action="toggle-service" data-id="${item.id}" style="background:none;border:none;color:rgba(240,235,227,0.25);cursor:pointer;font-size:14px;padding:0;line-height:1;transition:color 0.2s" onmouseover="this.style.color='rgba(240,235,227,0.7)'" onmouseout="this.style.color='rgba(240,235,227,0.25)'">×</button>
            </div>
          </div>
        `).join("")}
      </div>`;

  return `
    <div style="position:sticky;top:88px">
      <div style="background:#1c1a18;padding:28px;border:1px solid rgba(240,235,227,0.05)">
        <div style="display:flex;align-items:center;gap:10px;padding-bottom:20px;border-bottom:1px solid rgba(240,235,227,0.06);margin-bottom:20px">
          <img src="${logoPath}" style="height:30px;width:auto;opacity:0.8" alt="">
          <div>
            <div style="font-size:12px;font-weight:600;color:#f0ebe3;margin-bottom:2px">Wild Deer Barbershop</div>
            <div style="font-size:11px;color:rgba(240,235,227,0.35)">Roy's Rd, Amman</div>
          </div>
        </div>
        ${itemHtml}
        <div style="border-top:1px solid rgba(240,235,227,0.06);padding-top:16px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline">
          <span style="font-size:10px;font-weight:600;letter-spacing:2px;color:rgba(240,235,227,0.35);text-transform:uppercase">Total</span>
          <span style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:#f0ebe3">JOD ${totalPrice()}</span>
        </div>
        <div style="font-size:10px;color:rgba(240,235,227,0.2);text-align:right;margin-bottom:24px">${totalDuration() > 0 ? totalDuration() + " min total" : ""}</div>
        <button data-action="continue" style="width:100%;padding:14px;background:#f0ebe3;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;color:#141211;text-transform:uppercase;cursor:pointer;opacity:${canContinue(0) ? 1 : 0.28};transition:opacity 0.3s">Continue →</button>
      </div>
    </div>
  `;
}

function renderStep0() {
  return `
    <div style="max-width:1120px;margin:0 auto;padding:56px 48px;display:grid;grid-template-columns:1fr 320px;gap:56px;align-items:start">
      <div>
        <h1 style="font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;color:#f0ebe3;letter-spacing:-1px;margin-bottom:6px">Select your service</h1>
        <p style="font-size:13px;color:rgba(240,235,227,0.35);margin-bottom:36px">All services are for males. Select one or more.</p>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:40px">${renderCategories()}</div>
        ${renderServiceGroups()}
      </div>
      ${renderCart()}
    </div>
  `;
}

function renderStep1() {
  const barberCards = BARBERS.map(barber => {
    const selected = state.selectedBarber === barber.id;
    return `
      <div style="background:${selected ? "#242220" : "#1c1a18"};border:1px solid ${selected ? "rgba(184,149,106,0.5)" : "rgba(240,235,227,0.06)"};padding:20px 24px;display:flex;align-items:center;gap:20px;transition:all 0.22s">
        <div style="width:52px;height:52px;border-radius:50%;background:${selected ? "rgba(184,149,106,0.1)" : "rgba(240,235,227,0.04)"};border:1px solid ${selected ? "rgba(184,149,106,0.3)" : "rgba(240,235,227,0.08)"};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.22s">
          <span style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:${selected ? "#b8956a" : "rgba(240,235,227,0.3)"};transition:color 0.22s">${barber.initials}</span>
        </div>
        <div style="flex:1">
          <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:#f0ebe3;margin-bottom:3px">${barber.name}</div>
          <div style="font-size:10px;font-weight:500;letter-spacing:1.5px;color:rgba(240,235,227,0.3);text-transform:uppercase">${barber.role}</div>
        </div>
        <button data-action="select-barber" data-id="${barber.id}" style="padding:9px 22px;border:1px solid ${selected ? "#b8956a" : "rgba(240,235,227,0.18)"};background:${selected ? "rgba(184,149,106,0.1)" : "transparent"};color:${selected ? "#b8956a" : "rgba(240,235,227,0.45)"};font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.22s;flex-shrink:0">${selected ? "Selected ✓" : "Select"}</button>
      </div>
    `;
  }).join("");

  return `
    <div style="max-width:760px;margin:0 auto;padding:56px 48px;animation:fadeUp 0.35s ease both">
      <button data-action="back" style="background:none;border:none;color:rgba(240,235,227,0.3);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:2px;cursor:pointer;margin-bottom:40px;padding:0;text-transform:uppercase;transition:color 0.2s" onmouseover="this.style.color='rgba(240,235,227,0.7)'" onmouseout="this.style.color='rgba(240,235,227,0.3)'">← Back</button>
      <h1 style="font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;color:#f0ebe3;letter-spacing:-1px;margin-bottom:6px">Select your professional</h1>
      <p style="font-size:13px;color:rgba(240,235,227,0.35);margin-bottom:40px">Each brings their own precision. All share the same standard.</p>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:48px">${barberCards}</div>
      <button data-action="continue" style="width:100%;padding:16px;background:#f0ebe3;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;color:#141211;text-transform:uppercase;cursor:pointer;opacity:${canContinue(1) ? 1 : 0.28};transition:opacity 0.3s">Continue →</button>
    </div>
  `;
}

function dateCards() {
  const today = new Date();
  const startOffset = state.weekOffset * 7;
  return Array.from({ length: 7 }, (_, index) => {
    const date = new Date(today);
    const dayIndex = startOffset + index;
    date.setDate(date.getDate() + dayIndex);
    const dateString = date.toISOString().split("T")[0];
    const selected = state.selectedDate === dateString;
    const disabled = date.getDay() === 0 || dayIndex > 90;
    return `
      <button ${disabled ? "" : `data-action="select-date" data-date="${dateString}"`} style="flex:1;min-width:74px;padding:14px 8px;background:${disabled ? "rgba(28,26,24,0.3)" : selected ? "#f0ebe3" : "#1c1a18"};border:1px solid ${disabled ? "rgba(240,235,227,0.03)" : selected ? "#f0ebe3" : "rgba(240,235,227,0.06)"};cursor:${disabled ? "not-allowed" : "pointer"};transition:all 0.2s;text-align:center">
        <span style="display:block;font-size:10px;font-weight:600;letter-spacing:1.5px;color:${disabled ? "rgba(240,235,227,0.12)" : selected ? "rgba(20,18,17,0.45)" : "rgba(240,235,227,0.3)"};text-transform:uppercase;margin-bottom:8px">${date.toLocaleDateString("en-US", { weekday:"short" })}</span>
        <span style="display:block;font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:${disabled ? "rgba(240,235,227,0.12)" : selected ? "#141211" : "#f0ebe3"};line-height:1">${date.getDate()}</span>
        <span style="display:block;font-size:9px;color:${disabled ? "rgba(240,235,227,0.08)" : selected ? "rgba(20,18,17,0.35)" : "rgba(240,235,227,0.2)"};text-transform:uppercase;margin-top:6px">${date.toLocaleDateString("en-US", { month:"short" })}</span>
      </button>
    `;
  }).join("");
}

function timeSlots() {
  return TIME_SLOTS.filter(time => !UNAVAILABLE.includes(time)).map(time => {
    const selected = state.selectedTime === time;
    return `
      <button data-action="select-time" data-time="${time}" style="width:100%;padding:16px 20px;background:${selected ? "rgba(184,149,106,0.1)" : "#1c1a18"};border:1px solid ${selected ? "rgba(184,149,106,0.18)" : "rgba(240,235,227,0.05)"};border-left:2px solid ${selected ? "#b8956a" : "transparent"};color:${selected ? "#b8956a" : "rgba(240,235,227,0.65)"};font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;cursor:pointer;text-align:left;transition:all 0.2s">${formatTime(time)}</button>
    `;
  }).join("");
}

function renderStep2() {
  return `
    <div style="max-width:760px;margin:0 auto;padding:56px 48px;animation:fadeUp 0.35s ease both">
      <button data-action="back" style="background:none;border:none;color:rgba(240,235,227,0.3);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:2px;cursor:pointer;margin-bottom:40px;padding:0;text-transform:uppercase;transition:color 0.2s" onmouseover="this.style.color='rgba(240,235,227,0.7)'" onmouseout="this.style.color='rgba(240,235,227,0.3)'">← Back</button>
      <h1 style="font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;color:#f0ebe3;letter-spacing:-1px;margin-bottom:6px">Select date and time</h1>
      <p style="font-size:13px;color:rgba(240,235,227,0.35);margin-bottom:36px">Available for the next 3 months. Sundays closed.</p>
      <div style="margin-bottom:36px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <span style="font-size:10px;font-weight:600;letter-spacing:3px;color:rgba(184,149,106,0.5);text-transform:uppercase">Select a date</span>
          <div style="display:flex;gap:6px">
            <button data-action="prev-week" style="width:34px;height:34px;background:#1c1a18;border:1px solid rgba(240,235,227,0.06);color:#f0ebe3;cursor:pointer;opacity:${state.weekOffset === 0 ? 0.2 : 0.8};transition:opacity 0.2s">←</button>
            <button data-action="next-week" style="width:34px;height:34px;background:#1c1a18;border:1px solid rgba(240,235,227,0.06);color:#f0ebe3;cursor:pointer;opacity:${state.weekOffset >= 12 ? 0.2 : 0.8};transition:opacity 0.2s">→</button>
          </div>
        </div>
        <div style="display:flex;gap:6px">${dateCards()}</div>
      </div>
      ${state.selectedDate === null ? `
        <div style="background:#1c1a18;border:1px solid rgba(240,235,227,0.05);padding:28px;text-align:center;margin-bottom:40px">
          <span style="font-size:12px;color:rgba(240,235,227,0.18);font-style:italic">Select a date above to see available times</span>
        </div>
      ` : `
        <div style="margin-bottom:40px">
          <div style="font-size:10px;font-weight:600;letter-spacing:3px;color:rgba(184,149,106,0.5);text-transform:uppercase;margin-bottom:12px">${formatDate(state.selectedDate)}</div>
          <div style="display:flex;flex-direction:column;gap:4px">${timeSlots()}</div>
        </div>
      `}
      <button data-action="continue" style="width:100%;padding:16px;background:#f0ebe3;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;color:#141211;text-transform:uppercase;cursor:pointer;opacity:${canContinue(2) ? 1 : 0.28};transition:opacity 0.3s">Continue →</button>
    </div>
  `;
}

function renderStep3() {
  const services = cartItems().map(item => `
    <div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(240,235,227,0.04)">
      <span style="font-size:13px;color:rgba(240,235,227,0.7)">${esc(item.name)}</span>
      <span style="font-size:13px;color:rgba(240,235,227,0.45)">JOD ${item.price}</span>
    </div>
  `).join("");

  return `
    <div style="max-width:580px;margin:0 auto;padding:56px 48px;animation:fadeUp 0.35s ease both">
      <button data-action="back" style="background:none;border:none;color:rgba(240,235,227,0.3);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:2px;cursor:pointer;margin-bottom:40px;padding:0;text-transform:uppercase;transition:color 0.2s" onmouseover="this.style.color='rgba(240,235,227,0.7)'" onmouseout="this.style.color='rgba(240,235,227,0.3)'">← Back</button>
      <h1 style="font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;color:#f0ebe3;letter-spacing:-1px;margin-bottom:36px">Confirm booking</h1>
      <div style="background:#1c1a18;padding:28px;margin-bottom:28px;border:1px solid rgba(240,235,227,0.05)">
        <div style="font-size:10px;font-weight:600;letter-spacing:3px;color:rgba(184,149,106,0.5);text-transform:uppercase;margin-bottom:18px">Booking Summary</div>
        ${services}
        <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(240,235,227,0.04)"><span style="font-size:11px;letter-spacing:1px;color:rgba(240,235,227,0.28);text-transform:uppercase">Barber</span><span style="font-size:13px;color:#f0ebe3">${selectedBarberName()}</span></div>
        <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(240,235,227,0.04)"><span style="font-size:11px;letter-spacing:1px;color:rgba(240,235,227,0.28);text-transform:uppercase">Date</span><span style="font-size:13px;color:#f0ebe3">${formatDate(state.selectedDate)}</span></div>
        <div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(240,235,227,0.06);margin-bottom:14px"><span style="font-size:11px;letter-spacing:1px;color:rgba(240,235,227,0.28);text-transform:uppercase">Time</span><span style="font-size:13px;color:#f0ebe3">${state.selectedTime || ""}</span></div>
        <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:10px;font-weight:600;letter-spacing:2px;color:rgba(240,235,227,0.35);text-transform:uppercase">Total</span><span style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;color:#f0ebe3">JOD ${totalPrice()}</span></div>
      </div>
      <div style="margin-bottom:32px;background:#1c1a18;border:1px solid rgba(240,235,227,0.05)">
        <div style="padding:18px 24px;border-bottom:1px solid rgba(240,235,227,0.06)">
          <label style="display:block;font-size:9px;font-weight:600;letter-spacing:2px;color:rgba(240,235,227,0.3);text-transform:uppercase;margin-bottom:8px">Full Name</label>
          <input data-field="name" type="text" value="${esc(state.name)}" placeholder="Ahmad Al-Rashidi" style="width:100%;background:none;border:none;color:#f0ebe3;font-family:'DM Sans',sans-serif;font-size:15px;padding:0">
        </div>
        <div style="padding:18px 24px;border-bottom:1px solid rgba(240,235,227,0.06)">
          <label style="display:block;font-size:9px;font-weight:600;letter-spacing:2px;color:rgba(240,235,227,0.3);text-transform:uppercase;margin-bottom:8px">Phone Number</label>
          <input data-field="phone" type="tel" value="${esc(state.phone)}" placeholder="+962 7__ ______" style="width:100%;background:none;border:none;color:#f0ebe3;font-family:'DM Sans',sans-serif;font-size:15px;padding:0">
        </div>
        <div style="padding:18px 24px">
          <label style="display:block;font-size:9px;font-weight:600;letter-spacing:2px;color:rgba(240,235,227,0.3);text-transform:uppercase;margin-bottom:8px">Email Address</label>
          <input data-field="email" type="email" value="${esc(state.email)}" placeholder="name@example.com" style="width:100%;background:none;border:none;color:#f0ebe3;font-family:'DM Sans',sans-serif;font-size:15px;padding:0">
        </div>
      </div>
      <button data-action="continue" style="width:100%;padding:17px;background:#f0ebe3;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;color:#141211;text-transform:uppercase;cursor:pointer;opacity:${canContinue(3) ? 1 : 0.28};transition:opacity 0.3s">Confirm Appointment</button>
    </div>
  `;
}

function renderConfirmed() {
  return `
    <div style="min-height:calc(100vh - 68px);display:flex;align-items:center;justify-content:center;padding:60px 48px;animation:fadeUp 0.5s ease both">
      <div style="max-width:460px;text-align:center">
        <div style="width:72px;height:72px;border-radius:50%;border:1px solid rgba(184,149,106,0.35);display:flex;align-items:center;justify-content:center;margin:0 auto 32px">
          <span style="font-family:'Cormorant Garamond',serif;font-size:28px;color:#b8956a">✓</span>
        </div>
        <h1 style="font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;color:#f0ebe3;letter-spacing:-1px;margin-bottom:12px">You're booked.</h1>
        <p style="font-size:14px;color:rgba(240,235,227,0.4);line-height:1.7;margin-bottom:40px">Your appointment at Wild Deer is confirmed.<br>We'll have everything ready when you arrive.</p>
        <div style="background:#1c1a18;padding:24px;text-align:left;margin-bottom:36px;border:1px solid rgba(240,235,227,0.05)">
          <div style="display:flex;justify-content:space-between;padding:7px 0"><span style="font-size:11px;color:rgba(240,235,227,0.3);letter-spacing:1px;text-transform:uppercase">Barber</span><span style="font-size:13px;color:#f0ebe3">${selectedBarberName()}</span></div>
          <div style="display:flex;justify-content:space-between;padding:7px 0"><span style="font-size:11px;color:rgba(240,235,227,0.3);letter-spacing:1px;text-transform:uppercase">Date</span><span style="font-size:13px;color:#f0ebe3">${formatDate(state.selectedDate)}</span></div>
          <div style="display:flex;justify-content:space-between;padding:7px 0"><span style="font-size:11px;color:rgba(240,235,227,0.3);letter-spacing:1px;text-transform:uppercase">Time</span><span style="font-size:13px;color:#f0ebe3">${state.selectedTime || ""}</span></div>
          <div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid rgba(240,235,227,0.05);margin-top:4px"><span style="font-size:11px;color:rgba(240,235,227,0.3);letter-spacing:1px;text-transform:uppercase">Total</span><span style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:#b8956a">JOD ${totalPrice()}</span></div>
        </div>
        <a href="Barbershop.dc.html" style="display:inline-block;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;color:#141211;text-decoration:none;text-transform:uppercase;background:#f0ebe3;padding:14px 40px;transition:opacity 0.3s" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">Back to Site</a>
      </div>
    </div>
  `;
}

function renderContent() {
  if (state.booked) return renderConfirmed();
  if (state.step === 1) return renderStep1();
  if (state.step === 2) return renderStep2();
  if (state.step === 3) return renderStep3();
  return renderStep0();
}

function render() {
  app.innerHTML = `
    ${renderTopBar()}
    <div style="padding-top:68px;min-height:100vh">${renderContent()}</div>
  `;
}

app.addEventListener("click", event => {
  const target = event.target.closest("[data-action]");
  if (!target) return;

  const action = target.dataset.action;
  if (action === "category") state.activeCategory = target.dataset.id;
  if (action === "toggle-service") toggleService(target.dataset.id);
  if (action === "select-barber") state.selectedBarber = target.dataset.id;
  if (action === "select-date") {
    state.selectedDate = target.dataset.date;
    state.selectedTime = null;
  }
  if (action === "select-time") state.selectedTime = state.selectedTime === target.dataset.time ? null : target.dataset.time;
  if (action === "prev-week" && state.weekOffset > 0) {
    state.weekOffset -= 1;
    state.selectedDate = null;
    state.selectedTime = null;
  }
  if (action === "next-week" && state.weekOffset < 12) {
    state.weekOffset += 1;
    state.selectedDate = null;
    state.selectedTime = null;
  }
  if (action === "back") state.step = Math.max(0, state.step - 1);
  if (action === "continue" && canContinue(state.step)) {
    if (state.step === 3) state.booked = true;
    else state.step += 1;
  }

  if (action !== "toggle-service") render();
});

app.addEventListener("input", event => {
  if (event.target.dataset.field === "name") state.name = event.target.value;
  if (event.target.dataset.field === "phone") state.phone = event.target.value;
  if (event.target.dataset.field === "email") state.email = event.target.value;
  const confirmButton = app.querySelector('[data-action="continue"]');
  if (confirmButton && state.step === 3) confirmButton.style.opacity = canContinue(3) ? "1" : "0.28";
});

render();
</script>
</body>
</html>
